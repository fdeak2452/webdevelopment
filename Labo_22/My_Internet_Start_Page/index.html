<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Internet Start Page</title>
    <link rel="stylesheet" href="styles/index.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <h1>My Internet Start Page</h1>
    <p>Zoekopdracht</p>
    <input type="text" name="search" id="search" placeholder="Enter Commando" class="w-100">
    <p class="font-weight-light">Start your commando with "/[character] [search]</p>
    <input type="button" value="GO!" id="search-btn" class="btn btn-success w-100" >

    <h2>History</h2>
    <select id="sort-order" class="form-select w-auto">
        <option value="newest">Nieuw Eerst</option>
        <option value="oldest">Oud Eerst</option>
    </select>
    <div id="history-container" class="row"></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script src="scripts/index.js"></script>
</body>
</html>
