<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Formulier</title>
</head>
<body>
<form id="form">
    <label>Voornaam:
        <input type="text" id="voornaam">
        <span id="voornaam-error"></span>
    </label><br><br>
    <label>Familienaam:
        <input type="text" id="familienaam">
        <span id="familienaam-error"></span>
    </label><br><br>
    <label>Geboortedatum (jjjj-mm-dd):
        <input type="text" id="geboortedatum">
        <span id="geboortedatum-error"></span>
    </label><br><br>
    <label>Email:
        <input type="text" id="email">
        <span id="email-error"></span>
    </label><br><br>
    <label>Aantal kinderen:
        <input type="text" id="aantalKinderen">
        <span id="aantalKinderen-error"></span>
    </label><br><br>
    <button type="button" id="valideer">Valideer</button>
</form>
<script src="scripts/script.js"></script>
</body>
</html>
