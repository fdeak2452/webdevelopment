<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8" />
    <title>Formulier – oefening</title>
</head>
<body>
<form id="oefForm">
    <div>
        <label>
            Is roker
            <input type="checkbox" id="isRoker">
        </label>
    </div>
    <div>
        <span>Moedertaal</span>
        <label><input type="radio" name="moedertaal" value="nl" checked> Nederlands</label>
        <label><input type="radio" name="moedertaal" value="fr"> Frans</label>
        <label><input type="radio" name="moedertaal" value="en"> Engels</label>
    </div>
    <div>
        <label for="buurland">Favoriete buurland</label>
        <select id="buurland">
            <option>Nederland</option>
            <option selected>Frankrijk</option>
            <option>Duitsland</option>
        </select>
    </div>
    <div>
        <label for="bestelling">Bestelling</label>
        <select id="bestelling" multiple size="6">
            <option>aardappelen</option>
            <option>brood</option>
            <option>melk</option>
            <option>biefstuk</option>
            <option>chips</option>
            <option>krant</option>
        </select>
    </div>
    <button id="toonBtn" type="button">Toon resultaat</button>
</form>
<script src="scripts/script.js"></script>
</body>
</html>
