<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>hm</title>
  <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
<form method="post" action="">
    <fieldset>
        <legend>Persoonlijke Informatie</legend>
        <div class="form-row">
            <label for="fname">Voornaam:</label>
            <input type="text" id="fname" name="fname" placeholder="Your First Name" autofocus required>
        </div>
        <div class="form-row">
            <label for="lname">Familienaam:</label>
            <input type="text" id="lname" name="lname" placeholder="Your Last Name" required>
        </div>
    </fieldset>
    <fieldset>
        <legend>Sport</legend>
        <p>Welke sport beoefen je?</p>
        <div class="form-row">
            <input type="checkbox" id="sport" name="sport" value="lopen">
            <label for="sport">Lopen</label>
        </div>
        <div class="form-row">
            <input type="checkbox" id="zwemmen" name="sport" value="zwemmen">
            <label for="sport">Zwemmen</label>
        </div>
        <div class="form-row">
            <input type="checkbox" id="roeien" name="sport" value="roeien">
            <label for="sport">Roeien</label>
        </div>
    </fieldset>
    <fieldset>
        <legend>Communicatievoorkeur</legend>
        <p>Hoe kunnen we je bereiken?</p>
        <div class="form-row">
            <input type="radio" id="post" name="communicatie" value="post">
            <label for="post">Per post</label>
        </div>
        <div class="form-row">
            <input type="radio" name="communicatie" id="commemail">
            <label for="email">Per email</label>
        </div>
    </fieldset>
    <fieldset>
        <legend>Favorieten</legend>
        <div class="form-row">
            <label for="favFilm">Favoriete film:</label>
            <input type="text" name="favFilm" id="favFilm">
        </div>
        <div class="form-row">
            <label for="favQuote">Favoriete quote:</label>
            <input type="text" name="favQuote" id="favQuote" placeholder="Schrijf je favoriete quote">
        </div>
        <div class="form-row">
            <label for="favEten">Favoriete eten:</label>
            <select name="favEten" id="favEten" size="3" multiple>
                <option value="hamburger">Hamburger</option>
                <option value="hot-dog">Hot-dog</option>
                <option value="pizza">Pizza</option>
            </select>
        </div>
        <div class="form-row">
            <label for="favBrowser">Favoriete browser:</label>
            <input type="text" name="favBrowser" id="favBrowser">
        </div>
    </fieldset>
    <fieldset>
        <legend>Beveiliging & Contact</legend>
        <div class="form-row">
            <label for="wachtwoord">Wachtwoord*:</label>
            <input type="text" id="wachtwoord" name="wachtwoord" required >
        </div>
        <div class="form-row">
            <label for="email">E-mailadres:</label>
            <input type="email" id="email" name="email" placeholder="Geef je e-mailadres in">
        </div>
        <div class="form-row">
            <label for="url">Favoriete site:</label>
            <input type="url" id="url" name="url" placeholder="Geef de URL van je favoriete site">
        </div>
    </fieldset>
    <fieldset>
        <legend>Extra Informatie</legend>
        <div class="form-row">
            <label for="favGetal1">Favoriete getal tussen 1-10:</label>
            <input type="number" id="favGetal1" name="favGetal1" min="1" max="10">
        </div>
        <div class="form-row">
            <label for="favGetal2">Favoriete getal tussen 1-10:</label>
            <input type="number" id="favGetal2" name="favGetal2" min="11" max="1000">
        </div>
        <div class="form-row">
            <label for="geboortedatum">Wanneer ben je geboren?</label>
            <input type="date" id="geboortedatum" name="geboortedatum">
        </div>
        <div class="form-row">
            <label for="postcode">Belgische postcode*:</label>
            <input type="text" id="postcode" name="postcode" placeholder="Tussen 1000 en 9992"
                   pattern="^([1-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])$" maxlength="4" required>
        </div>
    </fieldset>
    <fieldset>
        <legend>Varia</legend>
        <div class="form-row">
            <label for="zoeken">Zoeken naar iets:</label>
            <input type="search" id="zoeken" name="zoeken">
        </div>
        <div class="form-row">
            <label for="zoekenkleur">Wat is je lievelingskleur?</label>
            <input type="color" id="zoekenkleur" name="zoeken">
        </div>
        <div class="form-row">
            <input type="file" id="file" name="file">
            <label for="file" hidden="hidden"></label>
        </div>
    </fieldset>
    <button type="submit">Submit</button>
</form>
<script src="scripts/script.js"></script>
</body>
</html>
